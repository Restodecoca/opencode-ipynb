# Publish workflow for opencode-ipynb.
# The publish job only runs on GitHub releases (`published` event). Cutting a release on GitHub is the trigger.
# Required secret: `NPM_TOKEN` (an npm automation token with publish rights for `@opencode-ipynb`/the configured name).

name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        env:
          SKIP_LOCK_BENCH: "1"
        run: bun test

      - name: Build
        run: bun run build

      - name: Setup Node.js for publish
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx --yes npm@latest publish --provenance --access public
